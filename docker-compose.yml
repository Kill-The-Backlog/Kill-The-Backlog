services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ktb
      POSTGRES_PASSWORD: ktb
      POSTGRES_DB: ktb
    command: postgres -c wal_level=logical
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ktb"]
      interval: 2s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file: .env
    environment:
      DB_URL: postgres://ktb:ktb@postgres:5432/ktb
      REDIS_URL: redis://valkey:6379
      MAIN_ORIGIN: http://localhost:3000
      GITHUB_OAUTH_REDIRECT_URI: http://localhost:3000/auth/github/callback
      ZERO_CACHE_URL: http://localhost:4848
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  zero-cache:
    build: .
    command:
      - pnpm
      - exec
      - zero-cache
    ports:
      - "4848:4848"
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      ZERO_ADMIN_PASSWORD: local-dev-admin
      ZERO_MUTATE_FORWARD_COOKIES: "true"
      ZERO_MUTATE_URL: http://app:3000/api/zero/mutate
      ZERO_QUERY_FORWARD_COOKIES: "true"
      ZERO_QUERY_URL: http://app:3000/api/zero/query
      ZERO_UPSTREAM_DB: postgres://ktb:ktb@postgres:5432/ktb

volumes:
  postgres_data:
  valkey_data:
